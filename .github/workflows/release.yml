name: Release (Manual)

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to validate (e.g. v0.1.0)"
        required: true
        type: string
      publish:
        description: "Publish to PyPI after validation"
        required: true
        default: false
        type: boolean
      repository:
        description: "PyPI repository: pypi or testpypi"
        required: true
        default: "testpypi"
        type: choice
        options:
          - testpypi
          - pypi

jobs:
  validate-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build/test tools
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install build twine

      - name: Validate release tag
        run: python3 scripts/validate_release_tag.py --tag "${{ inputs.tag }}"

      - name: Core quality gates
        run: |
          ruff check chronicle tools
          ruff format --check chronicle tools
          mypy chronicle
          pytest tests/ -q

      - name: Build distribution
        run: python -m build

      - name: Verify distribution metadata
        run: python -m twine check dist/*

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ inputs.tag }}
          path: dist/

  publish:
    needs: validate-and-build
    if: ${{ inputs.publish }}
    runs-on: ubuntu-latest
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-${{ inputs.tag }}
          path: dist/

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install twine
        run: |
          python -m pip install --upgrade pip
          pip install twine

      - name: Publish to TestPyPI
        if: ${{ inputs.repository == 'testpypi' }}
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.TEST_PYPI_API_TOKEN }}
        run: |
          python -m twine upload --repository testpypi dist/*

      - name: Publish to PyPI
        if: ${{ inputs.repository == 'pypi' }}
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          python -m twine upload --repository pypi dist/*
