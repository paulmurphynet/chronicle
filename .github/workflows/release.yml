name: Release (Manual)

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to validate (e.g. v0.9.0)"
        required: true
        type: string
      publish:
        description: "Publish to PyPI after validation"
        required: true
        default: false
        type: boolean
      repository:
        description: "PyPI repository: pypi or testpypi"
        required: true
        default: "testpypi"
        type: choice
        options:
          - testpypi
          - pypi

jobs:
  validate-and-build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: chronicle
          POSTGRES_USER: chronicle
          POSTGRES_PASSWORD: chronicle_dev_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U chronicle -d chronicle"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
      neo4j:
        image: neo4j:5
        env:
          NEO4J_AUTH: neo4j/chronicle_dev_password
        ports:
          - 7687:7687
        options: >-
          --health-cmd "cypher-shell -a bolt://localhost:7687 -u neo4j -p chronicle_dev_password 'RETURN 1;'"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install build/test tools
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,postgres,neo4j]"
          pip install pip-audit
          pip install build twine

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Validate release tag
        run: python3 scripts/validate_release_tag.py --tag "${{ inputs.tag }}"

      - name: Core quality gates (SQLite baseline)
        run: |
          ruff check chronicle tools
          ruff format --check chronicle tools
          mypy chronicle
          CHRONICLE_EVENT_STORE=sqlite pytest tests/ -q

      - name: Docs and parity gates
        run: |
          mkdir -p reports
          python3 scripts/check_doc_links.py docs
          python3 scripts/check_doc_links.py lessons
          python3 scripts/check_doc_links.py story
          python3 scripts/check_doc_links.py critical_areas
          python3 scripts/check_docs_currency.py
          python3 scripts/check_neo4j_contract.py
          python3 scripts/adapters/check_examples.py
          PYTHONPATH=. python3 scripts/check_integration_export_contracts.py --project-path /tmp/chronicle_integration_contract_project_release --output-dir /tmp/chronicle_integration_contract_release
          PYTHONPATH=. python3 scripts/check_branch_protection_rollout.py --repo "$GITHUB_REPOSITORY" --branch "${GITHUB_REF_NAME:-main}" --output reports/branch_protection_rollout_report.json
          PYTHONPATH=. python3 scripts/check_deterministic_defensibility.py --rounds 3 --output reports/deterministic_defensibility_release.json

      - name: Verifier and conformance release gate
        run: |
          CHRONICLE_EVENT_STORE=sqlite pytest tests/test_verify.py tests/test_verifier.py tests/test_verifier_parity.py -q
          PYTHONPATH=. python3 scripts/verticals/journalism/generate_sample.py --output /tmp/release_gate_sample.chronicle
          PYTHONPATH=. python3 scripts/run_conformance.py /tmp/release_gate_sample.chronicle

      - name: Postgres event-store gate
        env:
          CHRONICLE_POSTGRES_URL: postgresql://chronicle:chronicle_dev_password@127.0.0.1:5432/chronicle
        run: |
          mkdir -p reports
          PYTHONPATH=. python3 scripts/postgres_doctor.py --database-url "$CHRONICLE_POSTGRES_URL"
          PYTHONPATH=. python3 scripts/postgres_smoke.py --database-url "$CHRONICLE_POSTGRES_URL"
          PYTHONPATH=. python3 scripts/postgres_backend_parity.py \
            --database-url "$CHRONICLE_POSTGRES_URL" \
            --output reports/postgres_backend_parity_release.json
          PYTHONPATH=. python3 scripts/postgres_onboarding_timed_check.py \
            --database-url "$CHRONICLE_POSTGRES_URL" \
            --max-duration-seconds 600 \
            --output reports/postgres_onboarding_timed_release.json

      - name: Neo4j live integration gate
        env:
          CHRONICLE_RUN_NEO4J_LIVE_TESTS: "1"
          NEO4J_URI: bolt://127.0.0.1:7687
          NEO4J_USER: neo4j
          NEO4J_PASSWORD: chronicle_dev_password
        run: CHRONICLE_EVENT_STORE=sqlite pytest tests/test_neo4j_live_integration.py -q

      - name: Dependency vulnerability gate
        run: |
          mkdir -p reports
          pip-audit --format json --output reports/pip-audit.json || true
          cd frontend
          npm audit --json > ../reports/npm-audit.json || true
          cd ..
          python3 scripts/supply_chain_gate.py \
            --pip-report reports/pip-audit.json \
            --npm-report reports/npm-audit.json \
            --max-python-vulns 0 \
            --max-high 0 \
            --max-critical 0

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: fs
          format: json
          output: reports/trivy-fs.json
          ignore-unfixed: true
          severity: HIGH,CRITICAL
          scan-ref: .

      - name: Trivy base image scan (postgres:16)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: image
          image-ref: postgres:16
          format: json
          output: reports/trivy-postgres16.json
          ignore-unfixed: true
          severity: HIGH,CRITICAL

      - name: Container vulnerability gate
        run: |
          python3 scripts/container_security_gate.py \
            --report reports/trivy-fs.json \
            --report reports/trivy-postgres16.json \
            --max-high 0 \
            --max-critical 0

      - name: Build distribution
        run: python -m build

      - name: Verify distribution metadata
        run: python -m twine check dist/*

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ inputs.tag }}
          path: dist/

  publish:
    needs: validate-and-build
    if: ${{ inputs.publish }}
    runs-on: ubuntu-latest
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-${{ inputs.tag }}
          path: dist/

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install twine
        run: |
          python -m pip install --upgrade pip
          pip install twine

      - name: Publish to TestPyPI
        if: ${{ inputs.repository == 'testpypi' }}
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.TEST_PYPI_API_TOKEN }}
        run: |
          python -m twine upload --repository testpypi dist/*

      - name: Publish to PyPI
        if: ${{ inputs.repository == 'pypi' }}
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          python -m twine upload --repository pypi dist/*
