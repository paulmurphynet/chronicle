# Minimal CI: ruff lint + pytest (scorer, session, verifier smoke).
# Disabled until maintainer turns it on: triggers removed; run manually via "Run workflow" if needed.
name: CI

on:
  workflow_dispatch:
  # push:
  #   branches: [main, master]
  # pull_request:
  #   branches: [main, master]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install project and dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff lint (core)
        run: ruff check chronicle tools

      - name: Ruff format check (core)
        run: ruff format --check chronicle tools

      - name: Pytest with coverage (core)
        run: pytest tests/ -v --cov=chronicle --cov-report=term-missing --cov-report=xml --cov-report=html --cov-fail-under=60

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.python-version }}
          path: |
            htmlcov/
            coverage.xml

      - name: Check doc links
        run: python3 scripts/check_doc_links.py .

  frontend-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install API deps for route parity check
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[api]"

      - name: Install frontend deps
        working-directory: frontend
        run: npm install

      - name: Frontend API route parity
        working-directory: frontend
        run: npm run check:api-routes

      - name: Frontend lint
        working-directory: frontend
        run: npm run lint

      - name: Frontend tests
        working-directory: frontend
        run: npm run test

      - name: Frontend build
        working-directory: frontend
        run: npm run build
