# Minimal CI: ruff lint + pytest (scorer, session, verifier smoke).
# Disabled until maintainer turns it on: triggers removed; run manually via "Run workflow" if needed.
name: CI

on:
  workflow_dispatch:
  # push:
  #   branches: [main, master]
  # pull_request:
  #   branches: [main, master]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install project and dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff lint (core)
        run: ruff check chronicle tools

      - name: Ruff format check (core)
        run: ruff format --check chronicle tools

      - name: Pytest with coverage (core)
        run: pytest tests/ -v --cov=chronicle --cov=tools --cov-report=term-missing --cov-fail-under=33
