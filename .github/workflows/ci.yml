# CI: core checks, frontend checks, and Postgres event-store smoke.
name: CI

on:
  workflow_dispatch:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install project and dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff lint (core)
        run: ruff check chronicle tools

      - name: Ruff format check (core)
        run: ruff format --check chronicle tools

      - name: Pytest with coverage (core)
        run: pytest tests/ -v --cov=chronicle --cov-report=term-missing --cov-report=xml --cov-report=html --cov-fail-under=60

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.python-version }}
          path: |
            htmlcov/
            coverage.xml

      - name: Check doc links
        run: python3 scripts/check_doc_links.py .

      - name: Check docs currency
        run: python3 scripts/check_docs_currency.py

      - name: Check Neo4j contract parity
        run: python3 scripts/check_neo4j_contract.py

      - name: Check adapter examples and contract flow
        run: python3 scripts/adapters/check_examples.py

      - name: Check integration export/import contracts
        run: PYTHONPATH=. python3 scripts/check_integration_export_contracts.py --project-path /tmp/chronicle_integration_contract_project_ci --output-dir /tmp/chronicle_integration_contract_ci

      - name: Deterministic defensibility reproducibility check
        run: python3 scripts/check_deterministic_defensibility.py --rounds 3 --output /tmp/deterministic_defensibility_ci.json

      - name: Run reference workflows
        run: python3 scripts/run_reference_workflows.py --output-dir /tmp/chronicle_reference_workflows_ci

  frontend-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install API deps for route parity check
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[api]"

      - name: Install frontend deps
        working-directory: frontend
        run: npm install

      - name: Frontend API route parity
        working-directory: frontend
        run: npm run check:api-routes

      - name: Frontend lint
        working-directory: frontend
        run: npm run lint

      - name: Frontend tests
        working-directory: frontend
        run: npm run test

      - name: Frontend build
        working-directory: frontend
        run: npm run build

  postgres-event-store-smoke:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: chronicle
          POSTGRES_USER: chronicle
          POSTGRES_PASSWORD: chronicle_dev_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U chronicle -d chronicle"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install project with postgres extra
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[postgres]"

      - name: Postgres doctor
        env:
          CHRONICLE_POSTGRES_URL: postgresql://chronicle:chronicle_dev_password@127.0.0.1:5432/chronicle
        run: python3 scripts/postgres_doctor.py --database-url "$CHRONICLE_POSTGRES_URL"

      - name: Postgres event-store smoke
        env:
          CHRONICLE_POSTGRES_URL: postgresql://chronicle:chronicle_dev_password@127.0.0.1:5432/chronicle
        run: PYTHONPATH=. python3 scripts/postgres_smoke.py --database-url "$CHRONICLE_POSTGRES_URL"

      - name: Postgres backend parity gate
        env:
          CHRONICLE_POSTGRES_URL: postgresql://chronicle:chronicle_dev_password@127.0.0.1:5432/chronicle
        run: |
          mkdir -p reports
          PYTHONPATH=. python3 scripts/postgres_backend_parity.py \
            --database-url "$CHRONICLE_POSTGRES_URL" \
            --output reports/postgres_backend_parity_ci.json

      - name: Postgres onboarding timed gate
        env:
          CHRONICLE_POSTGRES_URL: postgresql://chronicle:chronicle_dev_password@127.0.0.1:5432/chronicle
        run: |
          mkdir -p reports
          PYTHONPATH=. python3 scripts/postgres_onboarding_timed_check.py \
            --database-url "$CHRONICLE_POSTGRES_URL" \
            --max-duration-seconds 600 \
            --output reports/postgres_onboarding_timed_ci.json

      - name: Upload Postgres gate reports
        uses: actions/upload-artifact@v4
        with:
          name: postgres-gate-reports
          path: reports/postgres_*_ci.json
